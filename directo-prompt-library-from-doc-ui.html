<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Directo 风格与提示词库</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#101114; --panel:#1b1d22; --panel2:#20232a; --panel3:#15171c;
      --line:#343842; --soft:#292d35; --text:#f5f6f8; --muted:#a3aab6; --faint:#757d89;
      --green:#10c78a; --greenSoft:rgba(16,199,138,.12); --amber:#f6b83f; --purple:#d46cff;
      --radius:8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); }
    button,input,select,textarea { font:inherit; color:inherit; }
    button { border:1px solid var(--line); background:var(--panel2); border-radius:var(--radius); padding:10px 13px; cursor:pointer; }
    button:hover { border-color:#59616d; }
    .primary { background:var(--green); border-color:var(--green); color:#06130f; font-weight:850; }
    .soft { background:var(--greenSoft); border-color:rgba(16,199,138,.48); color:#68efc0; }
    header { height:72px; border-bottom:1px solid var(--soft); display:flex; align-items:center; justify-content:space-between; padding:0 28px; background:rgba(16,17,20,.96); position:sticky; top:0; z-index:20; }
    .brand { display:flex; align-items:center; gap:12px; font-size:22px; font-weight:850; }
    .logo { width:28px; height:22px; border-radius:6px; background:linear-gradient(135deg,#10c78a,#22d3ee); position:relative; }
    .logo:after { content:""; position:absolute; right:-8px; top:3px; border-left:9px solid #10c78a; border-top:8px solid transparent; border-bottom:8px solid transparent; }
    nav { display:flex; gap:20px; color:var(--muted); }
    nav .active { color:var(--text); border-bottom:2px solid var(--green); padding-bottom:8px; }
    .wrap { max-width:1800px; margin:0 auto; padding:28px; }
    .head { display:flex; justify-content:space-between; gap:24px; align-items:flex-start; margin-bottom:20px; }
    h1 { margin:0 0 8px; font-size:28px; }
    h2 { margin:0; font-size:19px; }
    h3 { margin:0; font-size:15px; }
    p { margin:0; color:var(--muted); line-height:1.58; }
    .layout { display:grid; grid-template-columns:250px 1fr 560px; gap:18px; align-items:start; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
    .panel-head { padding:15px 16px; border-bottom:1px solid var(--soft); display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .panel-body { padding:16px; }
    .cat-list { display:grid; gap:10px; }
    .cat { border:1px solid var(--line); background:var(--panel3); border-radius:var(--radius); padding:13px; cursor:pointer; }
    .cat.active { border-color:rgba(16,199,138,.75); background:var(--greenSoft); }
    .cat strong { display:block; margin-bottom:5px; }
    .cat span { color:var(--muted); font-size:12px; }
    .toolbar { display:grid; grid-template-columns:1fr 148px; gap:10px; margin-bottom:14px; }
    .toolbar input,.toolbar select { background:var(--panel3); border:1px solid var(--line); border-radius:var(--radius); padding:11px 12px; outline:none; }
    .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; max-height:calc(100vh - 194px); overflow:auto; padding-right:4px; }
    .card { background:var(--panel2); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; cursor:pointer; min-height:314px; display:flex; flex-direction:column; }
    .card.active { border-color:rgba(16,199,138,.8); box-shadow:0 0 0 1px rgba(16,199,138,.24) inset; }
    .thumb { height:150px; background:#111; position:relative; overflow:hidden; border-bottom:1px solid var(--soft); }
    .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .placeholder { height:100%; display:grid; place-items:center; background:linear-gradient(135deg,#16191f,#243129 48%,#2b2230); color:#8bf1c8; font-weight:850; letter-spacing:0; }
    .badge { position:absolute; top:10px; left:10px; background:rgba(10,12,15,.78); border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:5px 8px; font-size:12px; color:#dbe1e8; backdrop-filter:blur(10px); }
    .card-body { padding:13px; display:flex; flex-direction:column; gap:9px; flex:1; }
    .card-title { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    .card-title b { font-size:16px; }
    .en { color:var(--faint); font-size:12px; margin-top:2px; }
    .tags { display:flex; gap:6px; flex-wrap:wrap; }
    .tag { display:inline-flex; border:1px solid var(--line); background:#13151a; color:var(--muted); border-radius:999px; padding:5px 8px; font-size:12px; line-height:1; }
    .tag.on { color:#65efbf; background:var(--greenSoft); border-color:rgba(16,199,138,.45); }
    .tag.warn { color:#ffd27a; background:rgba(246,184,63,.08); border-color:rgba(246,184,63,.4); }
    .small { color:var(--muted); font-size:12px; line-height:1.5; }
    .detail { position:sticky; top:92px; max-height:calc(100vh - 112px); overflow:auto; }
    .hero-img { height:230px; background:#111; border-bottom:1px solid var(--soft); position:relative; }
    .hero-img img { width:100%; height:100%; object-fit:cover; display:block; }
    .detail-section { padding:15px 16px; border-top:1px solid var(--soft); }
    .kv { display:grid; gap:10px; }
    .kv-row { display:grid; grid-template-columns:88px 1fr; gap:12px; align-items:start; }
    .kv-row label { color:var(--faint); font-size:13px; }
    .copybox { background:var(--panel3); border:1px solid var(--line); border-radius:var(--radius); padding:12px; color:#e8edf2; line-height:1.62; white-space:pre-wrap; min-height:110px; }
    .negative { color:#ffd4d4; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .pill-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .pill-tabs button { padding:8px 10px; border-radius:999px; font-size:13px; }
    .pill-tabs button.active { background:var(--greenSoft); border-color:rgba(16,199,138,.55); color:#67efbf; }
    .empty { padding:60px 20px; color:var(--muted); text-align:center; }
    @media (max-width: 1300px) { .layout { grid-template-columns:220px 1fr; } .detail { grid-column:1 / -1; position:static; max-height:none; } .grid { grid-template-columns:repeat(2,minmax(0,1fr)); max-height:none; } }
    @media (max-width: 760px) { .wrap { padding:16px; } header { padding:0 16px; } nav { display:none; } .layout { grid-template-columns:1fr; } .toolbar { grid-template-columns:1fr; } .grid { grid-template-columns:1fr; } .head { display:block; } }
  </style>
</head>
<body>
  <header>
    <div class="brand"><span class="logo"></span><span>Directo</span></div>
    <nav>
      <span>剧本</span><span>任务分配</span><span>资产库</span><span class="active">风格库</span>
    </nav>
    <button class="primary">+ 新建项目</button>
  </header>
  <main class="wrap">
    <section class="head">
      <div>
        <h1>风格与提示词库 / Prompt Library</h1>
        <p>基于 v2.2 文档整理为项目可用的风格包模块。参考图用于快速识别风格，默认复制的是精简项目提示词，不直接把长示例塞入制作项目。</p>
      </div>
      <div class="actions">
        <button>管理风格包</button>
        <button class="soft">导入到项目</button>
        <button class="primary">+ 自定义风格包</button>
      </div>
    </section>
    <section class="layout">
      <aside class="panel">
        <div class="panel-head"><h2>分类</h2><span class="tag on" id="totalCount"></span></div>
        <div class="panel-body">
          <div class="cat-list" id="cats"></div>
          <div class="detail-section" style="border-top:1px solid var(--soft); margin:16px -16px -16px;">
            <h3>项目使用建议</h3>
            <p class="small" style="margin-top:8px;">一个项目建议只锁定 1 个主风格包，可叠加少量“镜头语言、动态、负向”辅助提示词。制作页随时调用，但不要混用多个视觉大风格。</p>
          </div>
        </div>
      </aside>
      <section class="panel">
        <div class="panel-head">
          <h2 id="listTitle">全部提示词</h2>
          <span class="tag" id="visibleCount"></span>
        </div>
        <div class="panel-body">
          <div class="toolbar">
            <input id="search" placeholder="搜索风格、题材、光线、色彩、负向词" />
            <select id="sort">
              <option value="doc">按文档顺序</option>
              <option value="name">按名称</option>
              <option value="cat">按分类</option>
            </select>
          </div>
          <div class="grid" id="grid"></div>
        </div>
      </section>
      <aside class="panel detail" id="detail"></aside>
    </section>
  </main>

 "concise": "首帧保持，镜头缓慢推进或轻微横移，人物完成一个清晰动作，表情有自然过渡，背景结构稳定。", "note": "这是制作页调用提示词，不建议固定进所有风格包，可在分镜生成时按需追加。"}, {"cat": "common", "number": "C4", "name": "通用负向约束", "en": "Universal Negative", "usage": "所有模型", "light": "避免过曝、死黑、HDR 光晕", "color": "避免过饱和、色彩漂移、风格混杂", "texture": "避免低画质、模糊、伪影、过度锐化", "negative": {"en": "low quality, low resolution, blurry, jpeg artifacts, deformed anatomy, extra fingers, missing fingers, distorted face, identity drift, text, watermark, logo, style bleed", "cn": "低画质、低分辨率、模糊、压缩伪影、肢体变形、多手指、缺手指、脸部扭曲、身份漂移、文字、水印、Logo、风格污染"}, "concise": "低画质、低分辨率、模糊、压缩伪影、肢体变形、身份漂移、文字、水印、Logo、风格污染、画面闪烁。", "note": "产品上建议拆成勾选项：画质、肢体、身份、字幕水印、风格污染、视频伪影。"}];
    const CATS = [
      ["all", "全部", "查看完整 v2.2 风格库"],
      ["real", "仿真人", "真人短剧、电影、悬疑、甜宠"],
      ["two", "二维", "日漫、国风、韩漫、美漫、水墨"],
      ["three", "三维", "CGI、UE5、定格、低多边形"],
      ["common", "通用提示词", "骨架、角色一致性、动态、负向"]
    ];
    let state = { cat:"all", query:"", selected:DATA[0], tab:"project" };

    const catName = key => (CATS.find(c => c[0] === key) || [,""])[1];
    const $ = sel => document.querySelector(sel);
    function copyText(text) { navigator.clipboard?.writeText(text); }
    function textOf(item) {
      return [item.name,item.en,item.usage,item.representative,item.light,item.color,item.texture,item.concise,item.negative?.cn,item.negative?.en].filter(Boolean).join(" ");
    }
    function filtered() {
      let items = DATA.filter(item => state.cat === "all" || item.cat === state.cat);
      const q = state.query.trim().toLowerCase();
      if (q) items = items.filter(item => textOf(item).toLowerCase().includes(q));
      const sort = $("#sort").value;
      if (sort === "name") items = [...items].sort((a,b) => a.name.localeCompare(b.name, "zh-Hans-CN"));
      if (sort === "cat") items = [...items].sort((a,b) => catName(a.cat).localeCompare(catName(b.cat), "zh-Hans-CN") || a.number.localeCompare(b.number));
      return items;
    }
    function renderCats() {
      $("#totalCount").textContent = DATA.length + " 条";
      $("#cats").innerHTML = CATS.map(([key,name,desc]) => {
        const count = key === "all" ? DATA.length : DATA.filter(item => item.cat === key).length;
        return `<div class="cat ${state.cat === key ? "active" : ""}" data-cat="${key}"><strong>${name}</strong><span>${desc} · ${count} 条</span></div>`;
      }).join("");
      document.querySelectorAll(".cat").forEach(el => el.onclick = () => {
        state.cat = el.dataset.cat;
        const first = filtered()[0];
        if (first) state.selected = first;
        render();
      });
    }
    function card(item) {
      const img = item.image ? `<img src="${item.image}" alt="${item.name}参考图">` : `<div class="placeholder">${item.number}</div>`;
      return `<article class="card ${state.selected === item ? "active" : ""}" data-id="${item.number}">
        <div class="thumb">${img}<span class="badge">${catName(item.cat)}</span></div>
        <div class="card-body">
          <div class="card-title"><div><b>${item.name}</b><div class="en">${item.en || item.number}</div></div><span class="tag">${item.number}</span></div>
          <div class="tags">
            <span class="tag on">${item.source || "通用"}</span>
            ${item.representative ? `<span class="tag warn">${item.representative}</span>` : ""}
          </div>
          <p class="small">${item.usage || "项目视觉风格"}</p>
          <p class="small">${item.light || item.concise}</p>
        </div>
      </article>`;
    }
    function renderGrid() {
      const items = filtered();
      $("#visibleCount").textContent = items.length + " 条";
      $("#listTitle").textContent = state.cat === "all" ? "全部提示词" : catName(state.cat);
      $("#grid").innerHTML = items.length ? items.map(card).join("") : `<div class="empty">没有找到匹配的提示词</div>`;
      document.querySelectorAll(".card").forEach(el => el.onclick = () => {
        state.selected = DATA.find(item => item.number === el.dataset.id);
        state.tab = "project";
        render();
      });
    }
    function detailText(item) {
      if (state.tab === "negative") return `EN: ${item.negative?.en || ""}\n中：${item.negative?.cn || ""}`;
      if (state.tab === "fields") return `适用题材：${item.usage || ""}\n代表风格：${item.representative || ""}\n光线基调：${item.light || ""}\n色彩倾向：${item.color || ""}\n画质质感：${item.texture || ""}`;
      if (state.tab === "usage") return item.note || "";
      return item.concise || "";
    }
    function renderDetail() {
      const item = state.selected || filtered()[0] || DATA[0];
      const hero = item.image ? `<img src="${item.image}" alt="${item.name}参考图">` : `<div class="placeholder">${item.number}</div>`;
      const text = detailText(item);
      $("#detail").innerHTML = `
        <div class="hero-img">${hero}<span class="badge">参考图</span></div>
        <div class="panel-head">
          <div><h2>${item.name}</h2><p class="small">${item.en || item.number} · ${catName(item.cat)}</p></div>
          <span class="tag on">${item.number}</span>
        </div>
        <div class="detail-section">
          <div class="actions">
            <button class="primary" id="copyCurrent">复制当前提示词</button>
            <button id="copyAll">复制完整模板</button>
            <button class="soft">加入项目风格包</button>
          </div>
          <div class="pill-tabs">
            <button class="${state.tab === "project" ? "active" : ""}" data-tab="project">项目精简模块</button>
            <button class="${state.tab === "fields" ? "active" : ""}" data-tab="fields">字段详情</button>
            <button class="${state.tab === "negative" ? "active" : ""}" data-tab="negative">负向约束</button>
            <button class="${state.tab === "usage" ? "active" : ""}" data-tab="usage">使用说明</button>
          </div>
        </div>
        <div class="detail-section">
          <div class="copybox ${state.tab === "negative" ? "negative" : ""}">${escapeHtml(text)}</div>
        </div>
        <div class="detail-section">
          <div class="kv">
            <div class="kv-row"><label>光线</label><p>${item.light || "按项目设定补充"}</p></div>
            <div class="kv-row"><label>色彩</label><p>${item.color || "按项目设定补充"}</p></div>
            <div class="kv-row"><label>质感</label><p>${item.texture || "按项目设定补充"}</p></div>
            <div class="kv-row"><label>负向</label><p>${item.negative?.cn || "按需追加"}</p></div>
          </div>
        </div>`;
      document.querySelectorAll("[data-tab]").forEach(el => el.onclick = () => { state.tab = el.dataset.tab; renderDetail(); });
      $("#copyCurrent").onclick = () => copyText(text);
      $("#copyAll").onclick = () => copyText(`【${item.name}】\n${item.concise || ""}\n\n【负向】\nEN: ${item.negative?.en || ""}\n中：${item.negative?.cn || ""}`);
    }
    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function render() { renderCats(); renderGrid(); renderDetail(); }
    $("#search").addEventListener("input", e => { state.query = e.target.value; renderGrid(); });
    $("#sort").addEventListener("change", renderGrid);
    render();
  </script>
</body>
</html>
